name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          cache: true

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Create dummy key.properties
        run: |
          cat > simple_live_app/android/key.properties << 'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=debug.keystore
          EOF

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore simple_live_app/android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK (debug)
        run: |
          cd simple_live_app
          flutter build apk --debug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
